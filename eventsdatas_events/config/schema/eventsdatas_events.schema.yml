eventsdatas_events.settings:
  type: config_object
  label: 'EventsDatas Events settings'
  mapping:
    api_url:
      type: string
      label: 'URL API'
    api_key:
      type: string
      label: 'Clé API'
    api_limit:
      type: integer
      label: 'Nombre total récupéré API'
    per_page:
      type: integer
      label: 'Nombre affiché par page'
    city:
      type: string
      label: 'Ville par défaut'
    category:
      type: string
      label: 'Catégorie par défaut'
    date_from:
      type: string
      label: 'Date de début par défaut'
    date_to:
      type: string
      label: 'Date de fin par défaut'
    show_location:
      type: boolean
      label: 'Afficher le lieu'
